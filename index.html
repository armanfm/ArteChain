  <style>
    :root {
      --bg: #0c0c0e;

      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      min-height: 100%;
    }

    body {
      background:

      min-height: 100vh;
      padding-bottom: 64px;
    }

    a {
      color: var(--gold);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button,
    input,
    select {
      font: inherit;
    }

    code {
      font-family: "Space Mono", monospace;
      word-break: break-all;
    }

    header {
      align-items: center;
      background: rgba(12, 12, 14, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      display: flex;
      height: 72px;
      justify-content: space-between;
      left: 0;
      padding: 0 34px;
      position: sticky;
      right: 0;
      top: 0;
      z-index: 50;
    }

      font-family: "Playfair Display", serif;
      font-size: 1.8rem;
      letter-spacing: -0.03em;
    }

    .logo span {
      color: var(--gold);
      font-style: italic;
